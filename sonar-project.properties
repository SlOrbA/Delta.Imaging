# SonarQube Scanner configuration for Delta.Imaging

# Project information
sonar.projectKey=SlOrbA_Delta.Imaging
sonar.projectName=Delta.Imaging
sonar.projectVersion=1.2.0
sonar.projectDescription=C# imaging libraries with WSQ codec support

# Organization (for SonarCloud)
sonar.organization=lari-korpi-personal

# Source code directories
sonar.sources=Delta.Wsq/Delta.Wsq
sonar.tests=Delta.Wsq/tests

# Test inclusions (xUnit test files)
sonar.test.inclusions=**/*Tests.cs,**/*Test.cs

# Exclusions
sonar.exclusions=**/bin/**,**/obj/**,**/*.xaml.cs,**/packages/**,**/node_modules/**

# Code coverage exclusions
sonar.coverage.exclusions=**/Tests/**,**/TestApplication/**,**/packages/**

# C# specific settings
sonar.language=csharp
sonar.cs.opencover.reportPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/test-results.trx

# Enable quality gate
sonar.qualitygate.wait=true

# Links
sonar.links.homepage=https://github.com/SlOrbA/Delta.Imaging
sonar.links.scm=https://github.com/SlOrbA/Delta.Imaging
sonar.links.issue=https://github.com/SlOrbA/Delta.Imaging/issues
