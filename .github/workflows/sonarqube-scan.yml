name: SonarQube Scan

# Triggers: every push (scan code), every PR (check quality gate)
on:
  push:
    branches: ["master", "main", "develop", "pr/**"]
  pull_request:
  workflow_dispatch:

env:
  SONARQUBE_HOST_URL: https://sonarcloud.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dll:
    name: Build nbis DLL
    uses: ./.github/workflows/build-nbis-dll.yml

  sonarqube:
    name: SonarQube Code Analysis
    runs-on: windows-latest
    needs: build-dll
    # Run on windows-latest because project targets net8.0-windows
    # (Windows Desktop Framework required for tests)
    # Depends on build-dll for NBIS DLLs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      # Download the DLL artifact produced by the build-dll job.
      # The DLLs are placed into dependencies/ so the test project's
      # <Content> items copy them next to the test assembly at build time.
      - name: Download nbis DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: nbis-dll
          path: Delta.Wsq/dependencies/

      # Flatten the directory structure: Win32/nbis32.dll → nbis32.dll
      - name: Flatten DLL structure
        shell: pwsh
        run: |
          Move-Item -Path Delta.Wsq/dependencies/Win32/nbis32.dll -Destination Delta.Wsq/dependencies/nbis32.dll -Force
          Move-Item -Path Delta.Wsq/dependencies/x64/nbis64.dll -Destination Delta.Wsq/dependencies/nbis64.dll -Force
          Remove-Item -Path Delta.Wsq/dependencies/Win32, Delta.Wsq/dependencies/x64 -Recurse -Force

      - name: Show downloaded DLLs
        shell: pwsh
        run: Get-ChildItem Delta.Wsq\dependencies\*.dll | Select-Object Name

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore packages
        run: |
          dotnet restore Delta.Wsq/Delta.Wsq/Delta.Wsq.csproj
          dotnet restore Delta.Wsq/tests/Delta.Wsq.Tests/Delta.Wsq.Tests.csproj

      # Install SonarQube Scanner
      - name: Install SonarQube Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      # SonarQube analysis workflow:
      # 1. Begin analysis
      # 2. Build projects
      # 3. Run tests with coverage
      # 4. End analysis (sends results to SonarCloud)
      - name: Begin SonarQube analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          dotnet sonarscanner begin `
            /k:"SlOrbA_Delta.Imaging" `
            /o:"lari-korpi-personal" `
            /d:sonar.host.url=${{ env.SONARQUBE_HOST_URL }} `
            /d:sonar.login="${env:SONAR_TOKEN}" `
            /d:sonar.github.oauth="${env:GITHUB_TOKEN}" `
            /d:sonar.sources=Delta.Wsq/Delta.Wsq,Delta.Wsq/tests `
            /d:sonar.test.inclusions=**/*Tests.cs `
            /d:sonar.exclusions=**/bin/**,**/obj/**,**/*.xaml.cs `
            /d:sonar.coverage.exclusions=**/Tests/**,**/TestApplication/** `
            /d:sonar.cs.opencover.reportPaths="**/coverage.opencover.xml"

      - name: Build projects
        run: |
          dotnet build Delta.Wsq/Delta.Wsq/Delta.Wsq.csproj --configuration Release --no-restore
          dotnet build Delta.Wsq/tests/Delta.Wsq.Tests/Delta.Wsq.Tests.csproj --configuration Release --no-restore

      # Run tests with code coverage (Coverlet OpenCover format)
      - name: Run tests with coverage
        run: |
          dotnet test Delta.Wsq/tests/Delta.Wsq.Tests/Delta.Wsq.Tests.csproj `
            --configuration Release `
            --no-build `
            --collect:"XPlat Code Coverage" `
            --logger "trx;LogFileName=test-results.trx" `
            --logger "console;verbosity=normal"

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: dotnet sonarscanner end /d:sonar.login="${env:SONAR_TOKEN}"

      # SonarQube reports will be pushed automatically to SonarCloud
      # No need to upload artifacts as the scanner sends results directly

