name: SonarQube Scan

# Triggers: every push (scan code), every PR (check quality gate)
on:
  push:
    branches: ["master", "main", "develop", "pr/**"]
  pull_request:
  workflow_dispatch:

env:
  SONARQUBE_HOST_URL: https://sonarcloud.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dll:
    name: Build nbis DLL
    uses: ./.github/workflows/build-nbis-dll.yml

  sonarqube:
    name: SonarQube Code Analysis
    runs-on: windows-latest
    needs: build-dll
    # Run on windows-latest because project targets net8.0-windows
    # (Windows Desktop Framework required for tests)
    # Depends on build-dll for NBIS DLLs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      # Download the DLL artifact produced by the build-dll job.
      # The DLLs are placed into dependencies/ so the test project's
      # <Content> items copy them next to the test assembly at build time.
      - name: Download nbis DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: nbis-dll
          path: Delta.Wsq/dependencies/

      # Flatten the directory structure: Win32/nbis32.dll → nbis32.dll
      - name: Flatten DLL structure
        shell: pwsh
        run: |
          Move-Item -Path Delta.Wsq/dependencies/Win32/nbis32.dll -Destination Delta.Wsq/dependencies/nbis32.dll -Force
          Move-Item -Path Delta.Wsq/dependencies/x64/nbis64.dll -Destination Delta.Wsq/dependencies/nbis64.dll -Force
          Remove-Item -Path Delta.Wsq/dependencies/Win32, Delta.Wsq/dependencies/x64 -Recurse -Force

      - name: Show downloaded DLLs
        shell: pwsh
        run: Get-ChildItem Delta.Wsq\dependencies\*.dll | Select-Object Name

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Build and collect code coverage
      - name: Restore packages
        run: |
          dotnet restore Delta.Wsq/Delta.Wsq/Delta.Wsq.csproj
          dotnet restore Delta.Wsq/tests/Delta.Wsq.Tests/Delta.Wsq.Tests.csproj

      - name: Build
        run: |
          dotnet build Delta.Wsq/Delta.Wsq/Delta.Wsq.csproj --configuration Release --no-restore
          dotnet build Delta.Wsq/tests/Delta.Wsq.Tests/Delta.Wsq.Tests.csproj --configuration Release --no-restore

      # Run tests with code coverage (Coverlet OpenCover format)
      - name: Run tests with coverage
        run: |
          dotnet test Delta.Wsq/tests/Delta.Wsq.Tests/Delta.Wsq.Tests.csproj `
            --configuration Release `
            --no-build `
            --collect:"XPlat Code Coverage" `
            --logger "trx;LogFileName=test-results.trx" `
            --logger "console;verbosity=normal"

      # SonarQube scan
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # SonarCloud organization and project keys
          args: >
            -Dsonar.organization=lari-korpi-personal
            -Dsonar.projectKey=SlOrbA_Delta.Imaging
            -Dsonar.host.url=${{ env.SONARQUBE_HOST_URL }}
            -Dsonar.sources=Delta.Wsq/Delta.Wsq,Delta.Wsq/tests
            -Dsonar.test.inclusions=**/*Tests.cs
            -Dsonar.exclusions=**/bin/**,**/obj/**,**/*.xaml.cs
            -Dsonar.coverage.exclusions=**/Tests/**,**/TestApplication/**

      # Check Quality Gate
      - name: Check SonarQube Quality Gate
        id: quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      # Report Quality Gate result
      - name: Report Quality Gate Status
        run: |
          if [ "${{ steps.quality-gate.outcome }}" == "failure" ]; then
            echo "::warning::SonarQube Quality Gate failed. See https://sonarcloud.io/dashboard?id=SlOrbA_Delta.Imaging for details."
          else
            echo "✓ SonarQube Quality Gate passed"
          fi

      # Publish results
      - name: Upload SonarQube analysis to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: .scannerwork/
          retention-days: 30
